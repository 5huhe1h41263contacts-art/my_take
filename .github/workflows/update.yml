name: Update Flyers

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Node.jsセットアップ
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: ライブラリインストール
        run: npm install node-fetch@2 cheerio

      - name: スクリプト実行
        run: node script.js

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "auto update flyers" || echo "no changes"
          git push
