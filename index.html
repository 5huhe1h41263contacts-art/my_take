<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チラシ一覧</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .item {
      display: block;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
      background: #111;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ▼▼▼ ここに追加するだけ ▼▼▼ -->

  <a class="item" href="https://example.com/flyer1" target="_blank">
    <img src="https://example.com/flyer1.jpg">
  </a>

  <a class="item" href="https://example.com/flyer2" target="_blank">
    <img src="https://example.com/flyer2.jpg">
  </a>

  <a class="item" href="https://example.com/flyer3" target="_blank">
    <img src="https://example.com/flyer3.jpg">
  </a>

  <!-- ▲▲▲ ここまで ▲▲▲ -->

</div>

</body>
</html>
